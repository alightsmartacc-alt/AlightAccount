<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Organization - Alight</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo { font-size: 2.8rem; font-weight: 700; color: #1e40af; }
        .search-container { max-width: 460px; margin: 0 auto; }
        input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.1rem;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .org-list {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-height: 65vh;
            overflow-y: auto;
        }
        .org-item {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        .org-item:hover { background: #f8fafc; }
        .org-logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">alight</div>
        <h2>Find your organization</h2>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search any company..." onkeyup="filterOrgs()">
        <div class="org-list" id="orgList"></div>
    </div>

    <script>
        const organizations = [
            { 
                name: "Boeing", 
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Boeing_logo.svg/512px-Boeing_logo.svg.png" 
            },
            { 
                name: "United Airlines", 
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/United_Airlines_Logo.svg/512px-United_Airlines_Logo.svg.png" 
            },
            { 
                name: "Siemens Energy", 
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Siemens_logo.svg/512px-Siemens_logo.svg.png" 
            },
            { 
                name: "Lockheed Martin", 
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Lockheed_Martin_Logo.svg/512px-Lockheed_Martin_Logo.svg.png" 
            },
            { 
                name: "General Electric", 
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/GE_logo.svg/512px-GE_logo.svg.png" 
            },
            { 
                name: "Delta Air Lines", 
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d0/Delta_Air_Lines_Logo.svg/512px-Delta_Air_Lines_Logo.svg.png" 
            }
        ];

        function renderOrgs(list) {
            const container = document.getElementById('orgList');
            container.innerHTML = "";
            list.forEach(org => {
                const div = document.createElement('div');
                div.className = "org-item";
                div.innerHTML = `
                    <img src="${org.logo}" class="org-logo" alt="${org.name}">
                    <strong>${org.name}</strong>
                `;
                div.onclick = () => {
                    sessionStorage.setItem('selectedCompany', org.name);
                    sessionStorage.setItem('companyLogo', org.logo);
                    window.location.href = "login.html";
                };
                container.appendChild(div);
            });
        }

        function filterOrgs() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = organizations.filter(o => 
                o.name.toLowerCase().includes(term)
            );
            renderOrgs(filtered.length ? filtered : organizations);
        }

        // Initial render
        renderOrgs(organizations);
    </script>
</body>
</html>
